name: release-artifacts

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write # for gh release upload

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      release: true
      skip-nix-build: true

  upload:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write # for gh release upload
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" \
            classicube_plugin_updater_windows_x86_64/classicube_plugin_updater_windows_x86_64.dll \
            classicube_plugin_updater_linux_x86_64/classicube_plugin_updater_linux_x86_64.so \
            classicube_plugin_updater_macos_aarch64/classicube_plugin_updater_macos_aarch64.dylib
