name: build

on:
  pull_request:
    branches: [main, master, alpha, beta]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # for checkout

jobs:
  linux_nix:
    # Skip when dispatched from release.yml's publish phase: that job runs on
    # the only self-hosted runner and waits for this workflow to finish, so
    # linux_nix (also self-hosted) would queue forever behind it.
    if: ${{ github.event_name != 'workflow_dispatch' }}
    uses: SpiralP/github-reusable-workflows/.github/workflows/build.yml@836549c286c5fbf8b8bcf6cded0cd58259711a39 # main
    with:
      runs-on: self-hosted

  linux:
    name: Build Linux ${{ matrix.config.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: x86_64, target: x86_64-unknown-linux-gnu }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: SpiralP/github-reusable-workflows/.github/actions/build-classicube-plugin@01bb20b8dc6617fd150ac625e6cbf00467306fb7 # main
        with:
          arch: ${{ matrix.config.arch }}
          target: ${{ matrix.config.target }}

  windows:
    name: Build Windows ${{ matrix.config.arch }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: x86_64, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: SpiralP/github-reusable-workflows/.github/actions/build-classicube-plugin@01bb20b8dc6617fd150ac625e6cbf00467306fb7 # main
        with:
          arch: ${{ matrix.config.arch }}
          target: ${{ matrix.config.target }}

  mac:
    name: Build MacOS ${{ matrix.config.arch }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: aarch64, target: aarch64-apple-darwin }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: SpiralP/github-reusable-workflows/.github/actions/build-classicube-plugin@01bb20b8dc6617fd150ac625e6cbf00467306fb7 # main
        with:
          arch: ${{ matrix.config.arch }}
          target: ${{ matrix.config.target }}
