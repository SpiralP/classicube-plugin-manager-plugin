name: release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read # for build's checkout

jobs:
  build:
    uses: ./.github/workflows/build.yml
    if: "${{ ! startsWith(github.event.head_commit.message, 'chore(release): ') }}"
    with:
      release: true

  release:
    uses: SpiralP/github-reusable-workflows/.github/workflows/release.yml@f4413a1168ea736612235824efef210dc7416abc # main
    needs: build
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false # do not cancel in-progress jobs
    permissions: {} # none needed, uses a custom GitHub App token
    with:
      runs-on: self-hosted
      extends: ./.github/semantic-release.json
      replace-files: |
        Cargo.lock
        Cargo.toml
      assets: "*.{so,dll,dylib}"
    secrets:
      app-client-id: ${{ secrets.APP_CLIENT_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
